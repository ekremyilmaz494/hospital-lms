# Fly.io config — Hospital LMS NotebookLM Worker
# Region: fra (Vercel'in fra1'i ile aynı — düşük latency)
# Deploy: flyctl deploy
# Volume oluştur: flyctl volumes create notebook_data --size 3 --region fra

app = "hospital-lms-notebook-worker"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[[mounts]]
  source = "notebook_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop: 10 dk inaktivite sonrası uyu (idle cost'u sıfırla)
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 5
    hard_limit = 10

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
