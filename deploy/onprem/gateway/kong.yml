_format_version: "2.1"
# Kong declarative — Supabase self-host gateway'in minimal alt kümesi.
# App yalnız /auth/v1/* (GoTrue) ve /realtime/v1/* (Realtime) yollarını kullanır.
services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-route
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
