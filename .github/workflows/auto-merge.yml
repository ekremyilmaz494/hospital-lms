name: Auto-enable auto-merge

# Solo geliştirici workflow'u — repo sahibi tarafından açılan her PR'da
# "auto-merge when checks pass" özelliğini otomatik etkinleştirir.
#
# Neden: Solo dev senaryosunda PR review zorunluluğu yok ama CI'ı beklemek
# şart. Manuel "Enable auto-merge" butonuna basma adımı sıkıcı.
# Bu workflow o butonu otomatik bastırır; CI yeşil olunca merge tetiklenir.
#
# Gereksinim: Repo Settings → General → "Allow auto-merge" checkbox'ı açık olmalı.
# (Tek seferlik toggle; kod ile yapılamaz, dashboard'dan açılır.)
#
# Davranış:
# - Sadece repo sahibi (ekremyilmaz494) tarafından açılan PR'lara uygulanır
# - Squash + branch silme ile merge eder
# - PR draft'sa veya başka biri açtıysa hiçbir şey yapmaz

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  enable-auto-merge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
