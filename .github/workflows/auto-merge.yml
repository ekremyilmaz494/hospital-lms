name: Auto-enable auto-merge (label gated)

# Solo geliştirici workflow'u — SADECE `auto-merge` label'ı eklenmiş PR'larda
# GitHub'ın "auto-merge when checks pass" özelliğini otomatik etkinleştirir.
#
# Neden label gate:
# - Müşteri canlıda → her PR otomatik merge riskli (CI yakalamayan bug canlıya gider)
# - Güvenli fix'lerde `auto-merge` label'ı eklenince iş kolaylaşır
# - Kritik değişikliklerde label'sız bırak → manuel review + manuel merge
#
# Nasıl kullanılır:
#   1. PR'ı aç
#   2. Trivial fix/typo/doc ise PR sayfasında sağdan "auto-merge" label'ı ekle
#   3. CI yeşil olunca PR kendiliğinden squash-merge olur
#   4. Label yoksa hiçbir şey olmaz — normal merge akışı
#
# Gereksinim: Repo Settings → General → "Allow auto-merge" checkbox'ı açık olmalı.

on:
  pull_request:
    types: [labeled, opened, reopened, ready_for_review]

jobs:
  enable-auto-merge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == github.repository_owner &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
