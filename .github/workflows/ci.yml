name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 60
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

      - name: Start server
        run: pnpm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 90000

      - name: Run E2E tests
        run: pnpm test:e2e:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
          E2E_SUPER_EMAIL: ${{ secrets.E2E_SUPER_EMAIL }}
          E2E_SUPER_PASSWORD: ${{ secrets.E2E_SUPER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
