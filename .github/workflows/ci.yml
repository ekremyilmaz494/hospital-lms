name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version package.json packageManager field'ından okunur (corepack standard)

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Script guard check (yıkıcı scriptlerde production guard var mı?)
        # 2026-05-20 incident sonrası: guard'sız bir wipe-*/seed-* scripti merge edilemez.
        # Lint'ten ÖNCE konumlandı — hızlı, bağımsız Node kontrolü.
        run: node apps/web/scripts/check-script-guards.mjs

      - name: Migration drift check (schema.prisma ↔ migrations senkron mu?)
        env:
          SHADOW_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_shadow  # secret-scanner-disable-line
        run: |
          pnpm --filter web exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code
        # Prisma 7: shadow DB URL prisma.config.ts'te SHADOW_DATABASE_URL env'inden okunur.
        # --filter web ile CWD apps/web'e geçer, prisma/migrations + schema yolları doğru çözülür.
        # exit 0 = drift yok, exit 2 = drift var (PR bloklanır)
        # Drift varsa: pnpm db:migrate dev --name <açıklayıcı-isim> çalıştır

      - name: TypeScript check
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Editorial palette guard
        run: bash apps/web/scripts/editorial-palette-guard.sh

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm --filter web build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 60
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version package.json packageManager field'ından okunur (corepack standard)

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter web build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

      - name: Start server
        run: pnpm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 90000

      - name: Setup E2E test users
        # --i-understand-production: E2E secret'ları henüz prod projesine bakıyor.
        # Guard'ın bilinçli override'ı — CI kontrollü ortam. TODO: e2e'yi ayrı
        # staging DB'ye taşı (incident önleme planı P0.1 / P1).
        run: pnpm --filter web exec tsx scripts/setup-e2e-users.ts --i-understand-production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E tests
        run: pnpm test:e2e:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
          E2E_SUPER_EMAIL: ${{ secrets.E2E_SUPER_EMAIL }}
          E2E_SUPER_PASSWORD: ${{ secrets.E2E_SUPER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
