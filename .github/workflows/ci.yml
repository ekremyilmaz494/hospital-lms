name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version package.json packageManager field'ından okunur (corepack standard)

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Script guard check (yıkıcı scriptlerde production guard var mı?)
        # 2026-05-20 incident sonrası: guard'sız bir wipe-*/seed-* scripti merge edilemez.
        # Lint'ten ÖNCE konumlandı — hızlı, bağımsız Node kontrolü.
        run: node apps/web/scripts/check-script-guards.mjs

      - name: Migration drift check (schema.prisma ↔ migrations senkron mu?)
        env:
          SHADOW_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_shadow  # secret-scanner-disable-line
        run: |
          pnpm --filter web exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code
        # Prisma 7: shadow DB URL prisma.config.ts'te SHADOW_DATABASE_URL env'inden okunur.
        # --filter web ile CWD apps/web'e geçer, prisma/migrations + schema yolları doğru çözülür.
        # exit 0 = drift yok, exit 2 = drift var (PR bloklanır)
        # Drift varsa: pnpm db:migrate dev --name <açıklayıcı-isim> çalıştır

      - name: TypeScript check
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Editorial palette guard
        run: bash apps/web/scripts/editorial-palette-guard.sh

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm --filter web build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

  # On-prem build smoke — DEPLOYMENT_MODE=onprem standalone çıktısı bozulmasın
  # (ref guard atlanır, output:standalone, CSP env'den). Docker'ı çalıştırmaz;
  # yalnız `next build`'in onprem modda geçtiğini + standalone üretimini doğrular.
  onprem-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate
      - name: On-prem build (standalone)
        run: pnpm --filter web build --webpack
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: onprem
          DEPLOYMENT_MODE: onprem
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STORAGE_HOST: http://localhost:9000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line
      - name: Verify standalone output
        run: test -f apps/web/.next/standalone/apps/web/server.js

  # E2E job, setup-e2e-users.ts ile PROD Supabase'e dokunduğu için (incident-önleme
  # P0.1/P1) VARSAYILAN OLARAK ATLANIR. Aktive etmek için: ayrı staging/test Supabase
  # hazırla, secret'ları (DATABASE_URL, SUPABASE_SERVICE_ROLE_KEY, REDIS_*) staging'e
  # çevir, sonra repo değişkenini `RUN_E2E=true` yap (Settings → Variables).
  e2e:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 60
    if: github.event_name == 'push' && vars.RUN_E2E == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version package.json packageManager field'ından okunur (corepack standard)

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate

      - name: Install Playwright (chromium only)
        # playwright `apps/web` workspace'inde kurulu — kökte `pnpm exec` binary'yi
        # bulamaz (ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL). `--filter web` zorunlu.
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter web build --webpack
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci  # secret-scanner-disable-line

      - name: Start server
        run: pnpm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 90000

      - name: Setup E2E test users
        # --i-understand-production KALDIRILDI: assertNotProduction guard'ı gerçek backstop
        # olarak bırakıldı — DATABASE_URL prod'a bakıyorsa job güvenle DURUR (prod'a YAZMAZ).
        # E2E aktive edilmeden (RUN_E2E=true) önce secret'lar staging'e çevrilmeli.
        run: pnpm --filter web exec tsx scripts/setup-e2e-users.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E tests
        run: pnpm test:e2e:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_VAPID_KEY: placeholder
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
          E2E_SUPER_EMAIL: ${{ secrets.E2E_SUPER_EMAIL }}
          E2E_SUPER_PASSWORD: ${{ secrets.E2E_SUPER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
